<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2ea" />
    <title>Flashcards</title>
    <script>
      // Sets the `dark` class before first paint, so there's no flash of
      // the wrong theme. Keep the storage key in sync with ThemeProvider.tsx.
      // Also updates the theme-color meta tag immediately, so the PWA status
      // bar (when launched from the home screen) matches on first paint too.
      ;(function () {
        var stored = localStorage.getItem('flashcards:theme')
        var isDark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (isDark) {
          document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', '#14110f')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
